name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            export CC=clang CXX=clang++
          else
            export CC=gcc CXX=g++
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j "$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild Decl_Audio.sln -p:Configuration=Debug -p:Platform=x64 -m -v:minimal

      - name: Test
        run: x64\Debug\Decl_Audio.Tests.exe
